<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Painel do TI - Grupo Azuos</title><link rel="stylesheet" href="style.css"></head><body><script>if(sessionStorage.getItem("ti_logado")!=="sim"){window.location.href="login.html";}</script>
<header class="top-header admin-header"><div class="brand-side"><img src="logo-azuos.svg" alt="Grupo Azuos" class="brand-logo"></div><div class="header-title"><h1>Painel do TI</h1><p>Gerencie os chamados registrados</p></div><div class="header-actions"><a class="btn secondary" href="index.html">Abrir chamado</a><button id="btnLogout" class="danger">Sair</button></div></header>
<main class="container wide"><section class="card"><div class="admin-top"><h2>Chamados</h2><button id="btnExport" class="secondary">Exportar CSV</button></div><div class="filters"><input type="text" id="filterText" placeholder="Buscar por nome, chamado, departamento..."><select id="filterStatus"><option value="">Todos os status</option><option>Aberto</option><option>Em atendimento</option><option>Resolvido</option></select></div><div class="table-wrap"><table><thead><tr><th>Chamado</th><th>Data</th><th>Nome</th><th>Departamento</th><th>Tipo</th><th>AnyDesk</th><th>Status</th><th>Descrição</th><th>Print</th></tr></thead><tbody id="ticketsBody"></tbody></table></div></section></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="admin.js"></script></body></html>
